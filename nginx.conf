server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # CORS headers – erforderlich für externe Player wie sync-tube.de
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    # MP3 und weitere Audio-Typen
    types {
        audio/mpeg mp3 mp2 mpga;
        audio/wav wav;
        audio/ogg ogg oga;
        audio/mp4 m4a;
        audio/flac flac;
        audio/webm webm;
    }

    location / {
        # Range-Requests erlauben (wichtig für Seek/Skip in Playern)
        add_header Accept-Ranges bytes;
        try_files $uri $uri/ =404;
    }

    # Verzeichnis-Listing aktivieren wenn keine Datei angegeben
    location = / {
        autoindex on;
        autoindex_format html;
        autoindex_localtime on;
    }
}
